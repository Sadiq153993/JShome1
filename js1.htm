
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #calculator {margin: auto; display: table; box-shadow: 0 0 5px #333; padding: 30px; border-radius: 10px; background: aquamarine;}
        input, button {border: 1px solid #333; border-radius: 5px; padding: 5px 10px; margin: 5px;}
        button{width: 50px; height: 40px; margin: 5px; box-shadow: 3px 2px;}
        input{width: 220px; height: 30px; text-align: right; outline: none; box-shadow: 3px 2px; inset: #333;}
        button:active {box-shadow: 0 0 5px #333;}
        #eq {width: 115px; background: rgb(178, 189, 178);}
    </style>
</head>
<br>
    <div id="calculator">
        <input type="text" id="display">


        <div><button onclick="clean()">C</button>
            <button onclick="show('/')">/</button>
        </div>
        <div>
            <button onclick="show('7')">7</button>
            <button onclick="show('8')">8</button>
            <button onclick="show('9')">9</button>
            <button onclick="show('*')">*</button>
        </div>
        <div>
            <button onclick="show('4')">4</button>
            <button onclick="show('5')">5</button>
            <button onclick="show('6')">6</button>
            <button onclick="show('-')">-</button>
        </div>
        <div>
            <button onclick="show('1')">1</button>
            <button onclick="show('2')">2</button>
            <button onclick="show('3')">3</button>
            <button onclick="show('+')">+</button>
        </div>
    
        <div>
            <button onclick="show('.')">.</button>
            <button onclick="show('0')">0</button>
            <button onclick="calc()" id="eq">=</button>
            
        </div>
    </div>


    <script>
       const display = document.getElementById('display')


        function clean() {
            display.value = ''
        }
        function calc () {
            let netice = eval(display.value)
            display.value = netice

            if (netice === Infinity || netice === -Infinity) {
                display.value = '0-a bolmey olmaz'
            }

            else {
                display.value = netice
            }
        }
       function show(x) {
        display.value =  display.value + x
       }


       function vurma () {
        display.value * x
       }
    </script>

    <br></br><br></br>

</body>
</html>
